version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
    - "dependencies"
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "github.com/aws/aws-sdk-go-v2*"
        update-types:
          - "version-update:semver-patch"
