# Example Kubernetes Secrets for Database Credentials
#
# These examples show different ways to structure secrets for use with SQL Exporter's
# k8ssecret provider. Note: Only plain string values are supported (no JSON parsing).

---
# Example 1: Simple Secret with Full DSN (Current Namespace)
# Create with: kubectl apply -f secret-postgres-db.yaml
apiVersion: v1
kind: Secret
metadata:
  name: postgres-db
  labels:
    app: sql-exporter
    database: postgres
type: Opaque
stringData:
  # The complete DSN - referenced as k8ssecret://postgres-db
  data_source_name: "postgres://prometheus:prometheus@postgres.default.svc.cluster.local:5432/metrics"

---
# Example 2: Secret with Full DSN (Explicit Namespace)
# Create in monitoring namespace
apiVersion: v1
kind: Secret
metadata:
  name: postgres-db
  namespace: monitoring
  labels:
    app: sql-exporter
    database: postgres
type: Opaque
stringData:
  data_source_name: "postgres://prometheus:prometheus@postgres.monitoring.svc.cluster.local:5432/metrics"

---
# Example 3: Secret with Template Parameters
# Individual credentials that will be combined using the template parameter
apiVersion: v1
kind: Secret
metadata:
  name: postgres-creds
  labels:
    app: sql-exporter
    database: postgres
type: Opaque
stringData:
  # Each field is a plain string value
  username: "prometheus"
  password: "secure_password_here"
  host: "postgres.default.svc.cluster.local"
  port: "5432"
  database: "metrics"
  # Referenced as: k8ssecret://postgres-creds?key=password&template=postgres://prometheus:{{.}}@postgres.default.svc.cluster.local:5432/metrics

---
# Example 4: MySQL Password Secret
apiVersion: v1
kind: Secret
metadata:
  name: mysql-creds
  labels:
    app: sql-exporter
    database: mysql
type: Opaque
stringData:
  password: "mysql_password_123"
  # Usage: k8ssecret://mysql-creds?key=password&template=root:{{.}}@tcp(mysql.default.svc.cluster.local:3306)/mydb

---
# Example 5: Custom Key Name
# Use a custom key name instead of the default 'data_source_name'
apiVersion: v1
kind: Secret
metadata:
  name: oracle-db-secret
  labels:
    app: sql-exporter
    database: oracle
type: Opaque
stringData:
  # Custom key name
  oracle_connection_string: "oracle://user:password@oracle.default.svc.cluster.local:1521/mydb"
  # Referenced as: k8ssecret://oracle-db-secret?key=oracle_connection_string

---
# Example 6: Multi-Database with Different Keys
# A single secret holding multiple DSN values
apiVersion: v1
kind: Secret
metadata:
  name: multi-database-creds
  labels:
    app: sql-exporter
    databases: multiple
type: Opaque
stringData:
  postgres_dsn: "postgres://user:pass@postgres:5432/mydb"
  mysql_dsn: "root:password@tcp(mysql:3306)/mydb"
  sqlserver_dsn: "sqlserver://sa:password@sqlserver:1433?database=mydb"
  # Reference each with their own key:
  # k8ssecret://multi-database-creds?key=postgres_dsn
  # k8ssecret://multi-database-creds?key=mysql_dsn
  # k8ssecret://multi-database-creds?key=sqlserver_dsn
  partial_dsn: "user:pass@postgres:5432/mydb"
  password_only: "password_value"
