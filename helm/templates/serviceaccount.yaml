{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "sql-exporter.fullname" . }}
  labels:
    {{- include "sql-exporter.labels" . | nindent 4 }}
    {{- with .Values.serviceAccount.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "sql-exporter.annotations" . | nindent 4 }}
    {{- with .Values.serviceAccount.annotations}}
      {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: {{ default "false" .Values.serviceAccount.automountServiceAccountToken }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ template "sql-exporter.fullname" . }}-secret-reader
  labels:
    {{- include "sql-exporter.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ template "sql-exporter.fullname" . }}-secret-reader
  labels:
    {{- include "sql-exporter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ template "sql-exporter.fullname" . }}-secret-reader
subjects:
- kind: ServiceAccount
  name: {{ template "sql-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
